{% extends 'learning_logs/base.html' %}

{% block page_header %}
  <h2>更新日志</h2>
  <p>以下是网站更新日志：</p>
{% endblock %}

{% block content %}
  {% if logs %}
    <ul>
      {% for log in logs %}
        <div class="card mb-3">
          <div class="card-header">{{ log.date_added }}</div>
          <div class="card-body">{{ log|linebreaks }}</div>
        </div>
      {% endfor %}
    </ul>
  {% else %}
    <p>还没有更新日志！</p>
  {% endif %}
{% endblock %}
