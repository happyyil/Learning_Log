{% extends "learning_logs/base.html" %}

{% block page_header %}
  <h2><a href="{% url 'learning_logs:topics'%}" class="text-title">{{ topic }}</a></h2>
  <h3>编辑{{ topic }}的信息...</h3>
{% endblock page_header %}

{% block content %}

  <form action="{% url 'learning_logs:edit_topic' topic.id %}" method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button name="submit" class="btn-action edit">保存更改</button>
  </form>

{% endblock content %}
